<!DOCTYPE html>
<html>
<head>
    <title>Railway Booking Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
    Railway Booking Demo
</nav>

<div class="container">

    <h2>Search Trains</h2>

    <form>
        <label>From Station</label>
        <input type="text" placeholder="Lucknow">

        <label>To Station</label>
        <input type="text" placeholder="Delhi">

        <label>Journey Date</label>
        <input type="date">

        <button type="submit">Search Trains</button>
    </form>

    <div class="train-list">
        <h3>Available Trains</h3>

        <div class="train">
            12301 Rajdhani Express
        </div>

        <div class="train">
            12004 Shatabdi Express
        </div>

        <div class="train">
            12230 Lucknow Mail
        </div>
    </div>

</div>

</body>
</html>
